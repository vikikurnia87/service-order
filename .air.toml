# Konfigurasi air (hot-reload) — https://github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
  # Windows: output .exe. Ganti ke "./tmp/main" untuk Linux/macOS.
  cmd = "go build -o ./tmp/main.exe ./cmd"
  bin = "tmp/main.exe"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_dir = ["tmp", "bin", "vendor", "logs"]
  include_dir = []
  exclude_file = []
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = true

[misc]
  clean_on_exit = true
